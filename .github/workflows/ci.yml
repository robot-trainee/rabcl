name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy-ros-base
    steps:
      - name: Install CI prerequisites
        run: |
          apt-get update || (sleep 15 && apt-get update) || (sleep 30 && apt-get update)
          apt-get install -y --no-install-recommends \
            git \
            python3-colcon-common-extensions \
            python3-rosdep \
            ros-jazzy-ament-cmake-gtest \
            ros-jazzy-ament-lint-auto \
            ros-jazzy-ament-lint-common
          rosdep init || true
          rosdep update

      - uses: actions/checkout@v4
        with:
          path: src/rabcl

      - name: Install rosdeps
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          rosdep install --from-paths src --ignore-src -r -y

      - name: colcon build
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build --packages-up-to rabcl --event-handlers=console_cohesion+

      - name: colcon test
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon test --packages-select rabcl --event-handlers=console_direct+
          colcon test-result --verbose

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: colcon-logs-jazzy
          path: log
